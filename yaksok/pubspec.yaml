name: yaksok
description: "약쏙 - 노인을 위한 건강 관리 및 진료 보조 애플리케이션"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  flutter_local_notifications: ^17.2.3
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  fl_chart: ^0.69.0
  table_calendar: ^3.1.2
  lottie: ^3.1.2
  cached_network_image: ^3.4.1
  http: ^1.2.2
  provider: ^6.1.2
  flutter_svg: ^2.0.10+1
  flutter_map: ^8.2.1
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  app_links: ^6.4.0
  file_picker: ^8.1.7
  latlong2: ^0.9.1
  record: ^6.1.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  timezone: ^0.9.4
  kakao_flutter_sdk_user: ^1.9.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#A8C8CC"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - public/
